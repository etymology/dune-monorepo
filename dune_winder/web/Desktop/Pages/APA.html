<div id="apaColumns">
  <section id="column1">
    <article id="apaGCodePanel">
      <h2>G-Code</h2>
      <div class="apaGCodeTopRow">
        <section class="apaGCodeSubbox apaGCodeControlBox">
          <h3>G-Code Control</h3>
          <p>
            Current line: <span id="currentLine">-</span> of
            <span id="totalLines">-</span>
          </p>
          <div class="apaGCodeButtonRow">
            <button id="startButton">
              Start
            </button>
            <button id="stopButton">Stop Next</button>
            <button id="stepButton">Step</button>
          </div>
        </section>
      </div>

      <div class="apaGCodeBottomRow">
        <section class="apaGCodeSubbox">
          <h3>G-Code Selection</h3>
          <label for="layerSelection">Layer</label>
          <div class="select">
            <select id="layerSelection">
              <option value="G">G</option>
              <option value="U">U</option>
              <option value="V">V</option>
              <option value="X">X</option>
            </select>
          </div>
          <label for="gCodeSelection">G-Code selection</label>
          <div class="select">
            <select id="gCodeSelection">
              <option value=""></option>
            </select>
          </div>
          <div class="apaGCodeButtonRow">
            <button id="openGCodeButton">
              Open G-code
            </button>
            <button id="openCalibrationButton">
              Open calibration
            </button>
          </div>
        </section>

        <section id="apaSegmentLookupBox" class="apaGCodeSubbox">
          <h3>Pin Segment Lookup</h3>
          <label for="apaLookupSide">Side</label>
          <div class="select">
            <select id="apaLookupSide">
              <option value="B">B</option>
              <option value="A">A</option>
            </select>
          </div>
          <label for="apaLookupBoardSide">Board side</label>
          <div class="select">
            <select id="apaLookupBoardSide">
              <option value="head">Head</option>
              <option value="bottom">Bottom</option>
              <option value="foot">Foot</option>
              <option value="top">Top</option>
            </select>
          </div>
          <div class="apaGCodeInlineRow">
            <div class="apaLookupField">
              <label for="apaLookupBoardNumber">Board</label>
              <input
                type="number"
                id="apaLookupBoardNumber"
                step="1"
                value="1"
              />
            </div>
            <div class="apaLookupField">
              <label for="apaLookupPinNumber">Pin</label>
              <input
                type="number"
                id="apaLookupPinNumber"
                step="1"
                value="1"
              />
            </div>
          </div>
          <div class="apaGCodeButtonRow">
            <button id="apaLookupSegmentButton">
              Find line
            </button>
            <button id="apaLookupGotoButton" disabled>
              Go to line
            </button>
          </div>
          <p id="apaLookupSegmentResult" class="apaLookupResult">-</p>
          <pre id="apaLookupSegmentLine" class="apaLookupLine">-</pre>
        </section>

        <section id="gCodeControlDiv" class="apaGCodeSubbox">
          <h3>Line Seek</h3>
          <label for="apaLine">Next line</label>
          <div class="apaGCodeInlineRow">
            <input type="text" id="apaLine" />
            <button id="apaGotoLineButton">Go</button>
            <button id="apaNextLineButton">+</button>
            <button id="apaPreviousLineButton">-</button>
            <button id="apaRefreshButton">Refresh</button>
          </div>

          <h3>Go to wrap</h3>
          <label for="wrapNumber">Wrap</label>
          <div class="apaGCodeInlineRow">
            <input type="number" id="wrapNumber" min="0" style="width: 4em" />
            <button id="apaGotoWrapButton">Go</button>
          </div>

          <h3>Jump n wraps</h3>
          <label for="apaJumpWraps">Wrap delta</label>
          <div class="apaGCodeInlineRow">
            <input type="number" id="apaJumpWraps" value="0" style="width: 4em" />
            <button id="apaJumpWrapsButton">Jump n wraps</button>
          </div>
        </section>
      </div>
    </article>
    <div id="manualMoveCard">Loading...</div>
  </section>

  <section id="column2">
    <article id="forecastDiv">
      <h3>Forecast</h3>
      <p id="forecastWrapText">-</p>
    </article>
    <article id="gCodeDiv">Loading...</article>
  </section>

  <section id="column3">
    <article id="positionGraphicDiv">Loading...</article>
    <article id="queuedMotionPreviewDiv">Loading...</article>
  </section>
</div>

<section id="column4">
  <article id="recentLogDiv">Loading...</article>
</section>
