<article id="queuedMotionPreviewPanel">
  <h3>Queued Motion Preview</h3>
  <p id="queuedMotionPreviewStatus">Loading preview geometry...</p>
  <div id="queuedMotionPreviewSummary" class="queuedMotionPreviewSummary"></div>
  <div id="queuedMotionPreviewActions" class="queuedMotionPreviewActions">
    <button id="queuedMotionPreviewContinueButton" disabled>Continue path</button>
    <button id="queuedMotionPreviewCancelButton" disabled>Cancel path</button>
    <label id="queuedMotionPreviewAutoContinueLabel" class="queuedMotionPreviewCheckbox">
      <input type="checkbox" id="queuedMotionPreviewAutoContinue" />
      Automatically continue planned paths
    </label>
    <label id="queuedMotionPreviewUseMaxSpeedLabel" class="queuedMotionPreviewCheckbox">
      <input type="checkbox" id="queuedMotionPreviewUseMaxSpeed" />
      Default queued motions to maximum allowed speed
    </label>
  </div>
  <div class="queuedMotionPreviewViews">
    <section id="queuedMotionPreviewXZPanel" class="queuedMotionPreviewViewport">
      <h4>XZ Plane</h4>
      <canvas id="queuedMotionPreviewXZCanvas"></canvas>
    </section>
    <div id="queuedMotionPreviewBlankPanel" class="queuedMotionPreviewViewport queuedMotionPreviewBlank" aria-hidden="true"></div>
    <section id="queuedMotionPreviewXYPanel" class="queuedMotionPreviewViewport">
      <h4>XY Plane</h4>
      <canvas id="queuedMotionPreviewXYCanvas"></canvas>
    </section>
    <section id="queuedMotionPreviewYZPanel" class="queuedMotionPreviewViewport">
      <h4>YZ Plane</h4>
      <canvas id="queuedMotionPreviewYZCanvas"></canvas>
    </section>
  </div>
  <div class="queuedMotionPreviewColumns">
    <section class="queuedMotionPreviewSection">
      <h4>Source G113</h4>
      <div id="queuedMotionPreviewSource" class="queuedMotionPreviewList"></div>
    </section>
    <section class="queuedMotionPreviewSection">
      <h4>Ordered Segments</h4>
      <div id="queuedMotionPreviewSegments" class="queuedMotionPreviewList"></div>
    </section>
  </div>
</article>
