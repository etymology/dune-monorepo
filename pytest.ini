[pytest]
testpaths =
    tests/dune_tension
    tests/dune_winder
addopts =
    -n auto
    -m "not ladder_sim"
    --deselect tests/dune_winder/test_generate_plc_monoroutine.py::GeneratePlcMonoroutineTests::test_generated_monoroutine_contains_no_jsr_and_unique_program_tags
    --deselect tests/dune_winder/test_hmi_stop_request_generation.py::HMIStopRequestGenerationTests::test_generated_rll_matches_checked_in_pasteable
    --deselect tests/dune_winder/test_vscode_rll_syntax.py::VSCodeRllSyntaxTests::test_grammar_covers_all_supported_parser_opcodes
    --deselect tests/dune_winder/test_sync_monoroutine_tag_values.py::SyncMonoroutineTagValuesTests::test_monoroutine_source_resolution_is_unambiguous_for_current_export
markers =
    ladder_sim: ladder simulator tests (not in active development)
    integration: integration tests that load real models or external services
